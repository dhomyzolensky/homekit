<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 430" width="740" height="430" style="font-family:'SF Mono','Fira Code','Cascadia Code',monospace">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .titlebar { fill: #161b22; }
      .border { fill: none; stroke: #30363d; stroke-width: 1; }
      .dot-red { fill: #ff5f57; }
      .dot-yellow { fill: #febc2e; }
      .dot-green { fill: #28c840; }
      .title-text { fill: #8b949e; font-size: 12px; text-anchor: middle; }
      .prompt { fill: #58a6ff; font-size: 13px; }
      .cmd { fill: #e6edf3; font-size: 13px; }
      .cmd-green { fill: #3fb950; font-size: 13px; }
      .cmd-purple { fill: #bc8cff; font-size: 13px; }
      .cmd-yellow { fill: #e3b341; font-size: 13px; }
      .out { fill: #8b949e; font-size: 12px; }
      .out-name { fill: #e6edf3; font-size: 12px; }
      .out-on { fill: #3fb950; font-size: 12px; }
      .out-off { fill: #f85149; font-size: 12px; }
      .out-val { fill: #79c0ff; font-size: 12px; }
      .cursor { fill: #58a6ff; }
    </style>

    <!-- Typing animations for each command -->
    <!-- CMD 1: homekit list -->
    <style>
      #cmd1 { opacity: 0; animation: fadeIn 0.1s 0.5s forwards; }
      #out1 { opacity: 0; animation: fadeIn 0.1s 2.2s forwards; }
      #cmd2 { opacity: 0; animation: fadeIn 0.1s 4.5s forwards; }
      #out2 { opacity: 0; animation: fadeIn 0.1s 6.0s forwards; }
      #cmd3 { opacity: 0; animation: fadeIn 0.1s 8.0s forwards; }
      #out3 { opacity: 0; animation: fadeIn 0.1s 9.3s forwards; }
      #cmd4 { opacity: 0; animation: fadeIn 0.1s 11.5s forwards; }
      #out4 { opacity: 0; animation: fadeIn 0.1s 12.8s forwards; }
      #cursor1 { animation: blink 1s 0s 2 step-end, fadeOut 0.1s 2.1s forwards; }
      #cursor2 { opacity: 0; animation: fadeIn 0.01s 2.2s forwards, blink 1s 2.2s 2 step-end, fadeOut 0.1s 4.4s forwards; }
      #cursor3 { opacity: 0; animation: fadeIn 0.01s 6.0s forwards, blink 1s 6.0s 2 step-end, fadeOut 0.1s 7.9s forwards; }
      #cursor4 { opacity: 0; animation: fadeIn 0.01s 9.3s forwards, blink 1s 9.3s 2 step-end, fadeOut 0.1s 11.4s forwards; }
      #cursor5 { opacity: 0; animation: fadeIn 0.01s 12.8s forwards, blink 1s 12.8s infinite step-end; }

      @keyframes fadeIn { to { opacity: 1; } }
      @keyframes fadeOut { to { opacity: 0; } }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      /* Typewriter effect per char for cmd1 */
      #c1_1 { opacity:0; animation: fadeIn .05s 0.5s forwards }
      #c1_2 { opacity:0; animation: fadeIn .05s 0.6s forwards }
      #c1_3 { opacity:0; animation: fadeIn .05s 0.7s forwards }
      #c1_4 { opacity:0; animation: fadeIn .05s 0.8s forwards }
      #c1_5 { opacity:0; animation: fadeIn .05s 0.9s forwards }
      #c1_6 { opacity:0; animation: fadeIn .05s 1.0s forwards }
      #c1_7 { opacity:0; animation: fadeIn .05s 1.1s forwards }
      #c1_8 { opacity:0; animation: fadeIn .05s 1.2s forwards }
      #c1_9 { opacity:0; animation: fadeIn .05s 1.3s forwards }
      #c1_10 { opacity:0; animation: fadeIn .05s 1.4s forwards }
      #c1_11 { opacity:0; animation: fadeIn .05s 1.5s forwards }
      #c1_12 { opacity:0; animation: fadeIn .05s 1.6s forwards }

      #c2_1 { opacity:0; animation: fadeIn .06s 4.5s forwards }
      #c2_2 { opacity:0; animation: fadeIn .06s 4.62s forwards }
      #c2_3 { opacity:0; animation: fadeIn .06s 4.74s forwards }
      #c2_4 { opacity:0; animation: fadeIn .06s 4.86s forwards }
      #c2_5 { opacity:0; animation: fadeIn .06s 4.98s forwards }
      #c2_6 { opacity:0; animation: fadeIn .06s 5.10s forwards }
      #c2_7 { opacity:0; animation: fadeIn .06s 5.22s forwards }
      #c2_8 { opacity:0; animation: fadeIn .06s 5.34s forwards }
      #c2_9 { opacity:0; animation: fadeIn .06s 5.46s forwards }
      #c2_10 { opacity:0; animation: fadeIn .06s 5.58s forwards }
      #c2_11 { opacity:0; animation: fadeIn .06s 5.70s forwards }
      #c2_12 { opacity:0; animation: fadeIn .06s 5.82s forwards }
      #c2_13 { opacity:0; animation: fadeIn .06s 5.94s forwards }

      #c3_1 { opacity:0; animation: fadeIn .06s 8.0s forwards }
      #c3_2 { opacity:0; animation: fadeIn .06s 8.1s forwards }
      #c3_3 { opacity:0; animation: fadeIn .06s 8.2s forwards }
      #c3_4 { opacity:0; animation: fadeIn .06s 8.3s forwards }
      #c3_5 { opacity:0; animation: fadeIn .06s 8.4s forwards }
      #c3_6 { opacity:0; animation: fadeIn .06s 8.5s forwards }
      #c3_7 { opacity:0; animation: fadeIn .06s 8.6s forwards }
      #c3_8 { opacity:0; animation: fadeIn .06s 8.7s forwards }
      #c3_9 { opacity:0; animation: fadeIn .06s 8.8s forwards }
      #c3_10 { opacity:0; animation: fadeIn .06s 8.9s forwards }
      #c3_11 { opacity:0; animation: fadeIn .06s 9.0s forwards }
      #c3_12 { opacity:0; animation: fadeIn .06s 9.1s forwards }
      #c3_13 { opacity:0; animation: fadeIn .06s 9.2s forwards }

      #c4_1 { opacity:0; animation: fadeIn .06s 11.5s forwards }
      #c4_2 { opacity:0; animation: fadeIn .06s 11.62s forwards }
      #c4_3 { opacity:0; animation: fadeIn .06s 11.74s forwards }
      #c4_4 { opacity:0; animation: fadeIn .06s 11.86s forwards }
      #c4_5 { opacity:0; animation: fadeIn .06s 11.98s forwards }
      #c4_6 { opacity:0; animation: fadeIn .06s 12.10s forwards }
      #c4_7 { opacity:0; animation: fadeIn .06s 12.22s forwards }
      #c4_8 { opacity:0; animation: fadeIn .06s 12.34s forwards }
      #c4_9 { opacity:0; animation: fadeIn .06s 12.46s forwards }
      #c4_10 { opacity:0; animation: fadeIn .06s 12.58s forwards }
      #c4_11 { opacity:0; animation: fadeIn .06s 12.70s forwards }
    </style>
  </defs>

  <!-- Window chrome -->
  <rect width="740" height="430" rx="10" ry="10" class="bg"/>
  <rect width="740" height="430" rx="10" ry="10" class="border"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="740" height="38" rx="10" ry="10" class="titlebar"/>
  <rect x="0" y="18" width="740" height="20" class="titlebar"/>
  <rect x="0" y="37" width="740" height="1" style="fill:#30363d"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="19" r="6" class="dot-red"/>
  <circle cx="42" cy="19" r="6" class="dot-yellow"/>
  <circle cx="62" cy="19" r="6" class="dot-green"/>

  <!-- Window title -->
  <text x="370" y="24" class="title-text">homekit — bash</text>

  <!-- ─── Line 1: prompt + cmd1 ─── -->
  <text x="20" y="72" class="prompt">❯</text>
  <!-- "homekit list" typed character by character -->
  <text id="c1_1"  x="36"  y="72" class="cmd">h</text>
  <text id="c1_2"  x="44"  y="72" class="cmd">o</text>
  <text id="c1_3"  x="52"  y="72" class="cmd">m</text>
  <text id="c1_4"  x="60"  y="72" class="cmd">e</text>
  <text id="c1_5"  x="68"  y="72" class="cmd">k</text>
  <text id="c1_6"  x="76"  y="72" class="cmd">i</text>
  <text id="c1_7"  x="80"  y="72" class="cmd">t</text>
  <text id="c1_8"  x="90"  y="72" class="cmd"> </text>
  <text id="c1_9"  x="96"  y="72" class="cmd-purple">l</text>
  <text id="c1_10" x="104" y="72" class="cmd-purple">i</text>
  <text id="c1_11" x="108" y="72" class="cmd-purple">s</text>
  <text id="c1_12" x="116" y="72" class="cmd-purple">t</text>
  <rect id="cursor1" x="124" y="59" width="8" height="15" class="cursor" rx="1"/>

  <!-- Output of homekit list -->
  <g id="out1">
    <text x="36" y="94"  class="out">Accessories in </text><text x="148" y="94" class="out-val">My Home</text><text x="196" y="94" class="out"> (6)</text>
    <text x="36" y="112" class="out">  Living Room</text>
    <text x="36" y="128" class="out">  ├── Main Lights       </text><text x="216" y="128" class="out-on">● on</text>       <text x="264" y="128" class="out" style="font-size:11px">  brightness 80%</text>
    <text x="36" y="144" class="out">  ├── TV Backlight       </text><text x="216" y="144" class="out-off">● off</text>
    <text x="36" y="160" class="out">  Bedroom</text>
    <text x="36" y="176" class="out">  ├── Bedside Lamp       </text><text x="216" y="176" class="out-off">● off</text>
    <text x="36" y="192" class="out">  ├── Ceiling Fan        </text><text x="216" y="192" class="out-on">● on</text>       <text x="264" y="192" class="out" style="font-size:11px">  speed 2</text>
    <text x="36" y="208" class="out">  Front Door</text>
    <text x="36" y="224" class="out">  ├── Front Door Lock    </text><text x="216" y="224" class="out-on">● locked</text>
  </g>

  <!-- ─── Line 2: prompt + cmd2 ─── -->
  <text x="20" y="252" class="prompt">❯</text>
  <!-- homekit set "Main Lights" on -->
  <text id="c2_1"  x="36"  y="252" class="cmd">h</text>
  <text id="c2_2"  x="44"  y="252" class="cmd">o</text>
  <text id="c2_3"  x="52"  y="252" class="cmd">m</text>
  <text id="c2_4"  x="60"  y="252" class="cmd">e</text>
  <text id="c2_5"  x="68"  y="252" class="cmd">k</text>
  <text id="c2_6"  x="76"  y="252" class="cmd">i</text>
  <text id="c2_7"  x="80"  y="252" class="cmd">t</text>
  <text id="c2_8"  x="90"  y="252" class="cmd-purple"> set </text>
  <text id="c2_9"  x="130" y="252" class="cmd-yellow">"Main Lights"</text>
  <text id="c2_10" x="242" y="252" class="cmd"> </text>
  <text id="c2_11" x="248" y="252" class="cmd-green">40</text>
  <rect id="cursor2" x="264" y="239" width="8" height="15" class="cursor" rx="1"/>

  <!-- Output of set command -->
  <g id="out2">
    <text x="36" y="274" class="out">✓ </text><text x="52" y="274" class="out-val">Main Lights</text><text x="144" y="274" class="out"> set to </text><text x="200" y="274" class="out-green" style="fill:#3fb950">40%</text>
  </g>

  <!-- ─── Line 3: prompt + cmd3 ─── -->
  <text x="20" y="302" class="prompt">❯</text>
  <!-- homekit scene "Good Morning" -->
  <text id="c3_1"  x="36"  y="302" class="cmd">h</text>
  <text id="c3_2"  x="44"  y="302" class="cmd">o</text>
  <text id="c3_3"  x="52"  y="302" class="cmd">m</text>
  <text id="c3_4"  x="60"  y="302" class="cmd">e</text>
  <text id="c3_5"  x="68"  y="302" class="cmd">k</text>
  <text id="c3_6"  x="76"  y="302" class="cmd">i</text>
  <text id="c3_7"  x="80"  y="302" class="cmd">t</text>
  <text id="c3_8"  x="90"  y="302" class="cmd-purple"> scene </text>
  <text id="c3_9"  x="150" y="302" class="cmd-yellow">"Good Morning"</text>
  <rect id="cursor3" x="266" y="289" width="8" height="15" class="cursor" rx="1"/>

  <!-- Output of scene command -->
  <g id="out3">
    <text x="36" y="322" class="out">✓ Scene </text><text x="100" y="322" class="out-val">Good Morning</text><text x="206" y="322" class="out"> activated</text>
    <text x="36" y="338" class="out">  → Main Lights on 80% · TV Backlight off · Bedside Lamp on 20%</text>
  </g>

  <!-- ─── Line 4: prompt + cmd4 ─── -->
  <text x="20" y="366" class="prompt">❯</text>
  <!-- homekit scene export -->
  <text id="c4_1"  x="36"  y="366" class="cmd">h</text>
  <text id="c4_2"  x="44"  y="366" class="cmd">o</text>
  <text id="c4_3"  x="52"  y="366" class="cmd">m</text>
  <text id="c4_4"  x="60"  y="366" class="cmd">e</text>
  <text id="c4_5"  x="68"  y="366" class="cmd">k</text>
  <text id="c4_6"  x="76"  y="366" class="cmd">i</text>
  <text id="c4_7"  x="80"  y="366" class="cmd">t</text>
  <text id="c4_8"  x="90"  y="366" class="cmd-purple"> scene </text>
  <text id="c4_9"  x="150" y="366" class="cmd-purple">export</text>
  <text id="c4_10" x="198" y="366" class="cmd"> &gt; </text>
  <text id="c4_11" x="222" y="366" class="cmd-yellow">scenes.json</text>
  <rect id="cursor4" x="312" y="353" width="8" height="15" class="cursor" rx="1"/>

  <!-- Output of export -->
  <g id="out4">
    <text x="36" y="388" class="out">✓ Exported </text><text x="116" y="388" class="out-val">4 scenes</text><text x="176" y="388" class="out"> → scenes.json</text>
  </g>

  <!-- Final blinking cursor -->
  <text x="20" y="410" class="prompt" style="opacity:0;animation:fadeIn 0.1s 13.5s forwards">❯</text>
  <rect id="cursor5" x="36" y="397" width="8" height="15" class="cursor" rx="1"/>
</svg>
